    <meta name="theme-color" content="#000000" />

      name="description"
      content="This game is best funny game"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>JetRoyal Aviator</title>
    <script>
      // Fix: Prevent Unity WebGL "onwheel" null reference crash loop.
      // When navigating away from game, Unity WASM keeps running and tries to
      // access a canvas that no longer exists. This creates a hidden fallback canvas.
      (function() {
        // 1. Suppress Unity error alert dialogs
        var origAlert = window.alert;
        window.alert = function(msg) {
          if (typeof msg === 'string' && (msg.indexOf('onwheel') !== -1 || msg.indexOf('Unity') !== -1 || msg.indexOf('An error occurred running') !== -1)) {
            return;
          }
          origAlert.apply(window, arguments);
        };

        // 2. Patch addEventListener on HTMLCanvasElement to be safe
        var origAddEventListener = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function() {
          try { return origAddEventListener.apply(this, arguments); } catch(e) { return undefined; }
        };

        // 3. Suppress unhandled errors from Unity WASM
        window.addEventListener('error', function(e) {
          if (e && e.message && e.message.indexOf('onwheel') !== -1) {
            e.preventDefault();
            return true;
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          if (e && e.reason && e.reason.message && e.reason.message.indexOf('onwheel') !== -1) {
            e.preventDefault();
          }
        });
      })();
    </script>

    <div id="root"></div>
